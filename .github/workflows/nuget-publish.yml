name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: "Restore packages"
        run: dotnet restore

      - name: "Build project"
        run: dotnet build --no-restore --configuration Release

      - name: "Test project"
        run: dotnet test --no-restore --no-build --configuration Release
        
      - name: "Pack EntityWebApi.Automapper"
        run: dotnet pack EntityWebApi.AutoMapper/EntityWebApi.AutoMapper.csproj --no-restore --no-build --configuration Release --output dist

      - name: "Pack EntityWebApi.Controllers"
        run: dotnet pack EntityWebApi.Controllers/EntityWebApi.Controllers.csproj --no-restore --no-build --configuration Release --output dist

      - name: "Pack EntityWebApi.Core"
        run: dotnet pack EntityWebApi.Core/EntityWebApi.Core.csproj --no-restore --no-build --configuration Release --output dist

      - name: "Pack EntityWebApi.Dtos"
        run: dotnet pack EntityWebApi.Dtos/EntityWebApi.Dtos.csproj --no-restore --no-build --configuration Release --output dist

      - name: "Pack EntityWebApi.EFCore"
        run: dotnet pack EntityWebApi.EFCore/EntityWebApi.EFCore.csproj --no-restore --no-build --configuration Release --output dist

      - name: "Pack EntityWebApi.MinimalApi"
        run: dotnet pack EntityWebApi.MinimalApi/EntityWebApi.MinimalApi.csproj --no-restore --no-build --configuration Release --output dist

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: GrumpTech
  
      - name: NuGet push
        run: |
          for package in dist/*.nupkg; do
            dotnet nuget push "$package" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "${{steps.login.outputs.NUGET_API_KEY}}" \
              --skip-duplicate
          done
